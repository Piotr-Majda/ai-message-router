services:
  app:
    build:
      context: .
      target: app
    ports: 
      - "8000:80"
    environment:
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
    depends_on:
      mailhog:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/v1/docs"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 5s
  mailhog:
      image: mailhog/mailhog
      container_name: 'mailhog'
      ports:
        - "1025:1025"
        - "8025:8025"
      healthcheck:
        # MailHog image doesn't ship curl; use wget (BusyBox).
        test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8025/api/v2/messages >/dev/null 2>&1 || exit 1"]
        interval: 2s
        timeout: 5s
        retries: 20
        start_period: 5s
