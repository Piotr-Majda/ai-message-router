name: Python Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run integration tests
        run: uv run pytest

      - name: Start docker compose stack for smoke tests
        env:
          MODEL_NAME: llama3.1:8b
        run: docker compose up -d --build --wait --wait-timeout 600

      - name: Run smoke tests
        env:
          MODEL_NAME: llama3.1:8b
          SMOKE_BASE_URL: http://127.0.0.1:8000
          SMOKE_MAILHOG_API: http://127.0.0.1:8025
        run: uv run pytest -m smoke

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Stop docker compose stack
        if: always()
        run: docker compose down -v